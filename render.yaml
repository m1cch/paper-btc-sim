# Бесплатный деплой на Render.com (Docker).
# Репозиторий: корень = эта папка polymarket-bot (см. DEPLOY_FREE.md).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: polymarket-paper-bot
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: AUTO_TRADE
        value: "true"
      - key: INITIAL_DEPOSIT
        value: "300"
      - key: GAMMA_SERIES_ID
        value: "10192"
