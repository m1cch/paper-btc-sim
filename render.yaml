# Бесплатный деплой на Render.com (Docker).
# Репозиторий: корень репо = эта папка проекта (см. DEPLOY_FREE.md).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: paper-btc-sim
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: AUTO_TRADE
        value: "true"
      - key: INITIAL_DEPOSIT
        value: "300"
      - key: BASE_STAKE_USD
        value: "2"
      - key: GAMMA_SERIES_ID
        value: "10192"
